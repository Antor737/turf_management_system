<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Turf Booking</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
        }

        body.dark {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        body.light {
            background: #f5f5f5;
            color: #333;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .slot {
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .slot:hover {
            transform: scale(1.05);
        }

        .status {
            margin-top: 10px;
            padding: 5px;
            border-radius: 6px;
        }

        .available .status {
            background: green;
            color: white;
        }

        .booked .status {
            background: red;
            color: white;
        }

        .popup {
            position: fixed;
            top: 20px;
            right: -300px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .popup.show {
            right: 20px;
        }

        .popup.success {
            background: #00c853;
        }

        .popup.error {
            background: #d50000;
        }

        .toggle-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .loginBox {
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>

<body class="dark">

<button class="toggle-btn" onclick="toggleMode()">🌙 Toggle Mode</button>

//<h1>⚽ Turf Booking System</h1>


<!-- 🔐 AUTH SECTION -->
<div id="authBox" class="loginBox">

    <div id="loginForm">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email"><br><br>
        <input type="password" id="loginPassword" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
        <p>Don't have an account? 
            <span onclick="showRegister()" style="cursor:pointer;color:cyan;">Register</span>
        </p>
    </div>

    <div id="registerForm" style="display:none;">
        <h2>Register</h2>
        <input type="text" id="regName" placeholder="Name"><br><br>
        <input type="email" id="regEmail" placeholder="Email"><br><br>
        <input type="password" id="regPassword" placeholder="Password"><br><br>
        <button onclick="register()">Register</button>
        <p>Already have an account? 
            <span onclick="showLogin()" style="cursor:pointer;color:cyan;">Login</span>
        </p>
    </div>

</div>


<!-- 🟢 MAIN APP (HIDDEN FIRST) -->
<div id="appBox" style="display:none;">

    <div style="text-align:center; margin-bottom:20px;">
        <input type="date" id="selectedDate" onchange="loadSlots()" />
    </div>

    <div class="container" id="slots"></div>

</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<script>

// 🔄 SWITCH AUTH
function showRegister() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
}

function showLogin() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
}

// 🟢 REGISTER
async function register() {
    let name = document.getElementById('regName').value;
    let email = document.getElementById('regEmail').value;
    let password = document.getElementById('regPassword').value;

    let res = await fetch('http://127.0.0.1:8000/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
    });

    if (res.ok) {
        showPopup("Registration Successful", "success");
        showLogin();
    } else {
        showPopup("Registration Failed", "error");
    }
}

// 🔐 LOGIN (ONLY ONE)
async function login() {
    let email = document.getElementById('loginEmail').value;
    let password = document.getElementById('loginPassword').value;

    let res = await fetch('http://127.0.0.1:8000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    if (res.ok) {
        let user = await res.json();

        localStorage.setItem("user", JSON.stringify(user));

        document.getElementById('authBox').style.display = 'none';
        document.getElementById('appBox').style.display = 'block'; // 🔥 MUST

        loadSlots();

        showPopup("Login Success", "success");
    } else {
        showPopup("Login Failed", "error");
    }
}

// 🌙 THEME TOGGLE
function toggleMode() {
    document.body.classList.toggle('dark');
    document.body.classList.toggle('light');
}

// 🔔 POPUP
function showPopup(message, type) {
    let popup = document.getElementById('popup');

    popup.innerText = message;
    popup.className = 'popup show ' + type;

    setTimeout(() => {
        popup.classList.remove('show');
    }, 2000);
}

// 📦 LOAD SLOTS
async function loadSlots() {

    let date = document.getElementById('selectedDate')?.value;

    let url = 'http://127.0.0.1:8000/api/slots';

    let currentUser = JSON.parse(localStorage.getItem("user"));




    if (date) {
        url += '?date=' + date;
    }

    // 🔥 FIX: proper query handling
    url += (url.includes('?') ? '&' : '?') + 't=' + Date.now();

    let res = await fetch(url);
    let data = await res.json();

    let container = document.getElementById('slots');
    container.innerHTML = '';

    data.forEach(slot => {
        let div = document.createElement('div');
        div.classList.add('slot');

        function renderUI(isBooked) {

    let user = JSON.parse(localStorage.getItem("user"));

    let text = "Available";

    if (isBooked) {
        if (user && slot.user_id == user.id) {
            text = "🟢 Booked by You";   // ✅ no emoji (as you wanted before)
        } else {
            text = "🔴Booked";
        }
    }

    div.className = 'slot ' + (isBooked ? 'booked' : 'available');

    div.innerHTML = `
        <div>${slot.time}</div>
        <div class="status">${text}</div>
    `;
}

        renderUI(slot.is_booked);

        div.onclick = async () => {

    let user = JSON.parse(localStorage.getItem("user"));
    let newStatus = slot.is_booked ? 0 : 1;

    let res = await fetch(`http://127.0.0.1:8000/api/slots/${slot.id}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            is_booked: newStatus,
            user_id: user.id
        })
    });

    let updated = await res.json(); // 🔥 ONLY ONCE

    if (res.ok) {

        // ✅ update from backend
        slot.is_booked = updated.is_booked;
        slot.user_id = updated.user_id;

        renderUI(slot.is_booked);

        showPopup(
            slot.is_booked ? "Booked" : "Unbooked",
            slot.is_booked ? "success" : "error"
        );

    } else {
        showPopup(updated.message, "error");
    }
};

        container.appendChild(div);
    });
}


document.getElementById('appBox').style.display = 'none';

</script>

</body>
</html>
